name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-java:
    name: Build Spring Boot Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and push messaging-command-service
        working-directory: ./messaging-command-service
        env:
          MAVEN_OPTS: "-Xmx3g"
        run: |
          mvn compile jib:build \
            -Djib.to.image=ghcr.io/${{ env.OWNER }}/messaging-command-service:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

      - name: Build and push messaging-consumer
        working-directory: ./messaging-consumer
        env:
          MAVEN_OPTS: "-Xmx3g"
        run: |
          mvn compile jib:build \
            -Djib.to.image=ghcr.io/${{ env.OWNER }}/messaging-consumer:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  build-graphql:
    name: Build GraphQL Middleware
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push graphql-middleware
        uses: docker/build-push-action@v5
        with:
          context: ./graphql-middleware
          push: true
          tags: ghcr.io/${{ env.OWNER }}/graphql-middleware:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
