apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-consumer
  namespace: turknet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging-consumer
  template:
    metadata:
      labels:
        app: messaging-consumer
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done"]
        - name: wait-for-mongodb
          image: busybox
          command: ["sh", "-c", "until nc -z mongodb 27017; do echo waiting for mongodb; sleep 3; done"]
      containers:
        - name: messaging-consumer
          image: ghcr.io/melihemreguler/messaging-consumer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: SPRING_DATA_MONGODB_URI
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: messaging-consumer
  namespace: turknet
spec:
  selector:
    app: messaging-consumer
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
