apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: turknet
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: admin
  MONGO_INITDB_ROOT_PASSWORD: CHANGE_ME
  # Spring Boot servisleri tam URI ile bağlanır; YAML'daki 'spring.data.mongodb.uri'
  # değerini env vars override eder. Parolayı yukarıdaki ile aynı tutun.
  SPRING_DATA_MONGODB_URI: mongodb://admin:CHANGE_ME@mongodb:27017/turknet-messaging-db?authSource=admin
