apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-middleware
  namespace: turknet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graphql-middleware
  template:
    metadata:
      labels:
        app: graphql-middleware
    spec:
      initContainers:
        - name: wait-for-command-service
          image: busybox
          command: ["sh", "-c", "until nc -z messaging-command-service 8080; do echo waiting for command-service; sleep 3; done"]
      containers:
        - name: graphql-middleware
          image: ghcr.io/melihemreguler/graphql-middleware:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "development"
            - name: PORT
              value: "4000"
            - name: REST_API_BASE_URL
              value: "http://messaging-command-service:8080"
            - name: REST_API_TIMEOUT
              value: "30000"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_FORMAT
              value: "json"
            - name: CORS_ORIGIN
              value: "*"
            - name: CORS_CREDENTIALS
              value: "true"
            - name: GRAPHQL_PLAYGROUND
              value: "true"
            - name: GRAPHQL_INTROSPECTION
              value: "true"
            - name: GRAPHQL_DEBUG
              value: "false"
            - name: ELASTICSEARCH_ENABLED
              value: "true"
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch:9200"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: graphql-middleware
  namespace: turknet
spec:
  selector:
    app: graphql-middleware
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: graphql-middleware
  namespace: turknet
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    traefik.ingress.kubernetes.io/redirect-permanent: "true"
spec:
  tls:
    - hosts:
        - messaging.melihemre.dev
      secretName: messaging-melihemre-dev-tls
  rules:
    - host: messaging.melihemre.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graphql-middleware
                port:
                  number: 4000
